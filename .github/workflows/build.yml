name: Build

on:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]
  workflow_dispatch:
    inputs:
      file_name:
        description: "input file name"
        required: true
        default: "b.cpp"
        type: choice
        options:
          - a.cpp
          - b.cpp
          - c.cpp
      # inputs:
      #     options: v1
jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [ubuntu-latest, ubuntu-24.04]

    steps:
      - name: Print OS
        run: echo "Running on ${{ matrix.os }}"
  cpp-build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install g++
      run: sudo apt-get update && sudo apt-get install -y g++

    - name: Compile 
      run: g++ -std=c++17 ${{ inputs.file_name }} -o a

    - name: Run executable
      run: ./a  
  tag:
    runs-on: ubuntu-latest
    needs: cpp-build

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create tag
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          NEW_TAG="v1.${{ github.run_number }}"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"  
